<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azərbaycanca Öyrən</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="top-bar">
                <div class="logo">📚 Azərbaycanca</div>
                <div class="language-selector">
                    <button onclick="setLanguage('az')" class="lang-btn">AZ</button>
                    <button onclick="setLanguage('ru')" class="lang-btn">RU</button>
                    <button onclick="setLanguage('en')" class="lang-btn">EN</button>
                </div>
                <div class="auth-section">
                    <input type="password" id="adminCode" placeholder="Kod daxil edin" class="auth-input">
                    <button onclick="authenticate()" class="auth-btn">Daxil ol</button>
                </div>
            </div>
            <div class="timer">
                <span id="currentTime"></span>
            </div>
        </header>

        <div id="adminPanel" class="admin-panel hidden">
            <div class="admin-header">
                <h2 id="adminTitle">Admin Panel</h2>
            </div>
            
            <!-- Video управление -->
            <div class="admin-section">
                <h3 id="videoManageTitle">Video İdarə Et</h3>
                <div class="admin-controls">
                    <input type="text" id="videoUrl" placeholder="YouTube URL" class="input-field" autocomplete="off">
                    <input type="text" id="videoTitle" placeholder="Video başlığı" class="input-field" autocomplete="off">
                    <button onclick="addVideo()" class="btn btn-primary" id="addVideoBtn">Video Əlavə Et</button>
                </div>
            </div>

            <!-- PDF управление -->
            <div class="admin-section">
                <h3 id="pdfManageTitle">PDF İdarə Et</h3>
                <div class="admin-controls">
                    <input type="text" id="pdfName" placeholder="PDF adı" class="input-field" autocomplete="off">
                    <input type="file" id="pdfInput" accept=".pdf" class="input-field">
                    <button onclick="uploadPdf()" class="btn btn-success" id="uploadPdfBtn">PDF Yükləyin</button>
                </div>
            </div>
        </div>

        <main>
            <h1 id="mainTitle">Azərbaycanca Öyrən</h1>
            
            <!-- Поиск видео -->
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Videoları axtar..." class="search-field" autocomplete="off" oninput="filterVideos()">
            </div>
            
            <!-- Видео контейнер -->
            <div class="content-wrapper">
                <div class="videos-section">
                    <h2 id="videosTitle">Videolar</h2>
                    <div class="videos-container" id="videosContainer"></div>
                </div>

                <!-- PDF просмотр -->
                <div class="pdf-section" id="pdfSection">
                    <h2 id="pdfTitle">PDF Materialları</h2>
                    <div id="pdfViewer" class="pdf-viewer"></div>
                </div>
            </div>
        </main>

        <footer>
            <p id="footerText">© 2026 Azərbaycanca Öyrən. Bütün hüquqlar qorunur.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
